<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecionando...</title>

<script>
(function(){

// URL base de destino (sem UTMs fixas)
var baseUrl = "https://divinuzvips.xyz/go/oferta01";

// Captura todos os parâmetros atuais
var currentParams = window.location.search;

// Se houver parâmetros, adiciona ao destino
if(currentParams){
    window.location.href = baseUrl + currentParams;
} else {
    window.location.href = baseUrl;
}

})();
</script>

</head>
<body></body>
</html>
